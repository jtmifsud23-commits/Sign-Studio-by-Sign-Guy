<iframe
  src="https://sign-studio-by-sign-guy.vercel.app"
  title="Sign Studio"
  sandbox="allow-top-navigation-by-user-activation allow-popups allow-forms allow-scripts allow-same-origin"
></iframe>

<script>
  window.addEventListener('message', (event) => {
    if (event.origin !== 'https://sign-studio-by-sign-guy.vercel.app') return;

    const url =
      event.data?.type === 'SIGN_STUDIO_CHECKOUT' && event.data?.url
        ? event.data.url
        : event.data?.signStudioCheckoutUrl;

    if (url) {
      window.location.href = url;
    }
  });
</script>
